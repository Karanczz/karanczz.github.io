<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyPortfolio</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* A quick glassmorphism box for the login form */
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .auth-box {
            background: rgba(19, 19, 19, 0.5);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-box input {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 0.5rem;
        }
        .message { margin-top: 1rem; color: #00ffee; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-box">
            <h2>Welcome <span>Back</span></h2>
            
            <input type="email" id="email" placeholder="Enter your email">
            <input type="password" id="password" placeholder="Enter your password">
            
            <button id="loginBtn" class="btn">Login</button>
            <button id="signupBtn" class="btn" style="background: transparent; border: 1px solid var(--main-color); margin-top: 10px;">Sign Up</button>
            
            <p id="statusMessage" class="message"></p>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
